<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>나의 성격 알아보기</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:linear-gradient(160deg,#F0ECE3 0%,#E8E0D4 50%,#F5F0E8 100%);min-height:100vh;font-family:'Noto Sans KR',sans-serif;display:flex;justify-content:center;padding:20px 16px}
#app{width:100%;max-width:440px}
.screen{display:flex;flex-direction:column;align-items:center;gap:16px;opacity:0;transform:translateY(24px);transition:all .6s cubic-bezier(.16,1,.3,1)}
.screen.active{opacity:1;transform:translateY(0)}

/* Start */
.start-emoji{font-size:72px;margin-top:40px;margin-bottom:8px}
.start-title{font-size:36px;font-weight:900;color:#2C2416;text-align:center;line-height:1.3;letter-spacing:-1px}
.start-sub{font-size:18px;color:#6B5B4E;font-weight:500;text-align:center}
.start-note{font-size:14px;color:#9E8E7E;text-align:center;line-height:1.6;padding:0 20px}
.btn-start{margin-top:20px;padding:18px 48px;font-size:20px;font-weight:700;color:#fff;background:linear-gradient(135deg,#FF6B35,#E85D26);border:none;border-radius:16px;cursor:pointer;font-family:'Noto Sans KR',sans-serif;box-shadow:0 6px 24px rgba(255,107,53,.35);transition:transform .15s}
.btn-start:active{transform:scale(.95)}

/* Progress */
.progress-wrap{width:100%;display:flex;align-items:center;gap:12px}
.progress-track{flex:1;height:8px;background:#D9D0C4;border-radius:4px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,#FF6B35,#F7C948);border-radius:4px;transition:width .5s cubic-bezier(.16,1,.3,1)}
.progress-text{font-size:14px;font-weight:700;color:#8B7D6B;white-space:nowrap}

/* Badge */
.dim-badge{display:inline-flex;padding:6px 16px;background:#fff;border-radius:20px;font-size:13px;font-weight:600;color:#6B5B4E;box-shadow:0 2px 8px rgba(0,0,0,.06)}

/* Question */
.q-card{width:100%;background:#fff;border-radius:20px;padding:28px 24px;box-shadow:0 4px 20px rgba(0,0,0,.06)}
.q-text{font-size:20px;font-weight:700;color:#2C2416;line-height:1.6;text-align:center;word-break:keep-all}

/* Options */
.opt-btn{width:100%;display:flex;align-items:flex-start;gap:14px;padding:20px 18px;background:#fff;border:2.5px solid #e0e0e0;border-radius:16px;cursor:pointer;text-align:left;font-family:'Noto Sans KR',sans-serif;transition:all .25s ease;box-shadow:0 2px 12px rgba(0,0,0,.04)}
.opt-btn:active{transform:scale(.97)}
.opt-btn.picked{opacity:.7;transform:scale(.97)}
.opt-label{display:inline-flex;align-items:center;justify-content:center;width:32px;min-width:32px;height:32px;border-radius:10px;color:#fff;font-size:15px;font-weight:800;margin-top:2px}
.opt-text{font-size:17px;font-weight:500;color:#3D3425;line-height:1.6;word-break:keep-all}

/* Result */
.result-confetti{font-size:56px;margin-top:20px}
.result-label{font-size:16px;color:#8B7D6B;font-weight:500}
.type-row{display:flex;gap:10px;margin-top:4px}
.type-letter{width:60px;height:60px;display:flex;align-items:center;justify-content:center;border-radius:16px;color:#fff;font-size:28px;font-weight:900;animation:popIn .5s cubic-bezier(.16,1,.3,1) both}
.type-letter:nth-child(1){animation-delay:0s}
.type-letter:nth-child(2){animation-delay:.15s}
.type-letter:nth-child(3){animation-delay:.3s}
.type-letter:nth-child(4){animation-delay:.45s}
@keyframes popIn{0%{transform:scale(0) rotate(-20deg);opacity:0}60%{transform:scale(1.2) rotate(5deg)}100%{transform:scale(1) rotate(0);opacity:1}}
.result-title{font-size:28px;font-weight:900;color:#2C2416;margin-top:8px}
.result-desc{font-size:16px;color:#6B5B4E;text-align:center;line-height:1.7;padding:0 10px;word-break:keep-all}
.detail-section{width:100%;display:flex;flex-direction:column;gap:12px;margin-top:12px;opacity:0;transform:translateY(20px);transition:all .6s ease}
.detail-section.show{opacity:1;transform:translateY(0)}
.detail-heading{font-size:18px;font-weight:800;color:#2C2416;text-align:center;margin-bottom:4px}
.dim-card{background:#fff;border-radius:16px;padding:18px 20px;box-shadow:0 2px 12px rgba(0,0,0,.05)}
.dim-header{display:flex;align-items:center;gap:10px;margin-bottom:6px}
.dim-emoji{font-size:22px}
.dim-label{font-size:16px;font-weight:700;color:#2C2416}
.dim-desc{font-size:14px;color:#6B5B4E;line-height:1.6;margin-bottom:12px;word-break:keep-all}
.bar-track{height:8px;background:#EDE8E0;border-radius:4px;overflow:hidden;margin-bottom:6px}
.bar-fill{height:100%;border-radius:4px;transition:width 1s cubic-bezier(.16,1,.3,1)}
.bar-labels{display:flex;justify-content:space-between;font-size:13px}
.disclaimer{font-size:13px;color:#A89888;text-align:center;margin-top:8px}
.btn-restart{padding:16px 40px;font-size:18px;font-weight:700;color:#6B5B4E;background:#fff;border:2px solid #D9D0C4;border-radius:14px;cursor:pointer;font-family:'Noto Sans KR',sans-serif;margin-bottom:40px;transition:all .15s}
.btn-restart:active{transform:scale(.95)}
.hidden{display:none!important}
</style>
</head>
<body>
<div id="app">

  <!-- START SCREEN -->
  <div id="screen-start" class="screen active">
    <div class="start-emoji">🧭</div>
    <h1 class="start-title">나의 성격<br>알아보기</h1>
    <p class="start-sub">12개의 질문에 답해 보세요!</p>
    <p class="start-note">이 테스트는 재미로 하는 것이에요.<br>정확한 심리 검사가 아니에요.</p>
    <button class="btn-start" onclick="startQuiz()">시작하기 →</button>
  </div>

  <!-- QUIZ SCREEN -->
  <div id="screen-quiz" class="screen hidden">
    <div class="progress-wrap">
      <div class="progress-track"><div id="progress-fill" class="progress-fill" style="width:0%"></div></div>
      <span id="progress-text" class="progress-text">1 / 12</span>
    </div>
    <div id="dim-badge" class="dim-badge"></div>
    <div class="q-card"><p id="q-text" class="q-text"></p></div>
    <button id="opt-a" class="opt-btn" onclick="pickAnswer('A')">
      <span id="label-a" class="opt-label">A</span>
      <span id="text-a" class="opt-text"></span>
    </button>
    <button id="opt-b" class="opt-btn" onclick="pickAnswer('B')">
      <span id="label-b" class="opt-label">B</span>
      <span id="text-b" class="opt-text"></span>
    </button>
  </div>

  <!-- RESULT SCREEN -->
  <div id="screen-result" class="screen hidden">
    <div class="result-confetti">🎉</div>
    <p class="result-label">나의 성격 유형은...</p>
    <div id="type-row" class="type-row"></div>
    <h2 id="result-title" class="result-title"></h2>
    <p id="result-desc" class="result-desc"></p>
    <div id="detail-section" class="detail-section"></div>
    <p class="disclaimer">이 테스트는 재미로 하는 것이에요 😊</p>
    <button class="btn-restart" onclick="restart()">다시 하기 🔄</button>
  </div>

</div>

<script>
const questions=[
{id:"Q1",dimension:"EI",text:"주말에 시간이 있어요. 나는 무엇을 하고 싶어요?",a:{text:"친구들과 밖에서 활발하게 놀고 싶어요",type:"E"},b:{text:"혼자 집에서 조용히 쉬고 싶어요",type:"I"}},
{id:"Q2",dimension:"EI",text:"새 학교에 처음 갔어요. 나는 어떻게 해요?",a:{text:"옆에 앉은 친구에게 먼저 밝게 인사해요",type:"E"},b:{text:"조용히 앉아서 다른 친구가 먼저 말할 때까지 기다려요",type:"I"}},
{id:"Q3",dimension:"EI",text:"학교 점심시간이에요. 나는 어디에 있어요?",a:{text:"친구들이 많은 곳에서 활발하게 이야기해요",type:"E"},b:{text:"조용한 곳에서 친한 친구 한 명과 같이 있어요",type:"I"}},
{id:"Q4",dimension:"SN",text:"선생님이 숙제를 내줬어요. 나는 어떻게 해요?",a:{text:"선생님이 말한 것을 꼼꼼하게 하나씩 따라 해요",type:"S"},b:{text:"다른 친구와 다르게 창의적으로 새로운 방법을 생각해요",type:"N"}},
{id:"Q5",dimension:"SN",text:"미술 시간에 그림을 그려요. 나는 어떻게 그려요?",a:{text:"눈으로 본 것을 꼼꼼하게 똑같이 그려요",type:"S"},b:{text:"머릿속에서 창의적으로 새로운 것을 만들어서 그려요",type:"N"}},
{id:"Q6",dimension:"SN",text:"재미있는 이야기 책을 읽었어요. 나는 어떤 것이 더 좋아요?",a:{text:"이야기 안에 있는 것을 꼼꼼하게 기억하는 것",type:"S"},b:{text:"\"다음에는 어떤 일이 생길까?\" 창의적으로 생각하는 것",type:"N"}},
{id:"Q7",dimension:"TF",text:"친구 두 명이 싸웠어요. 나는 어떻게 해요?",a:{text:"누가 맞고 누가 틀렸는지 논리적으로 생각해요",type:"T"},b:{text:"두 친구 모두 마음이 아프니까 따뜻하게 이야기를 들어 줘요",type:"F"}},
{id:"Q8",dimension:"TF",text:"친구가 시험 점수가 나빠서 슬퍼해요. 나는 뭐라고 해요?",a:{text:"\"어디가 틀렸는지 같이 논리적으로 찾아보자\"",type:"T"},b:{text:"\"괜찮아, 다음에 잘할 수 있어\" 따뜻하게 말해요",type:"F"}},
{id:"Q9",dimension:"TF",text:"중요한 것을 결정해야 해요. 나는 어떻게 결정해요?",a:{text:"좋은 점과 나쁜 점을 논리적으로 비교해요",type:"T"},b:{text:"내 마음이 따뜻하게 느끼는 쪽을 선택해요",type:"F"}},
{id:"Q10",dimension:"JP",text:"친구들과 여행을 가요. 나는 어떻게 준비해요?",a:{text:"어디에 갈지 계획적으로 순서를 먼저 정해요",type:"J"},b:{text:"계획 없이 자유롭게 가고 싶은 곳에 가요",type:"P"}},
{id:"Q11",dimension:"JP",text:"방학 숙제가 많아요. 나는 어떻게 해요?",a:{text:"날짜를 정해서 계획적으로 매일 조금씩 해요",type:"J"},b:{text:"하고 싶을 때 자유롭게 해요",type:"P"}},
{id:"Q12",dimension:"JP",text:"토요일에 친구를 만나요. 나는 어떻게 해요?",a:{text:"몇 시에 어디에서 만날지 계획적으로 미리 정해요",type:"J"},b:{text:"\"그때 연락하자!\" 자유롭게 정해요",type:"P"}}
];

const resultTypes={
E:{emoji:"🌟",label:"활발하고 밝은 성격",desc:"사람들과 함께 있을 때 기분이 좋아요. 밝게 웃고, 활발하게 이야기하는 것을 좋아해요."},
I:{emoji:"🌙",label:"조용하고 내성적인 성격",desc:"혼자 있는 시간이 편해요. 조용한 곳에서 생각하거나 쉬는 것을 좋아해요."},
S:{emoji:"🔍",label:"하나하나 꼼꼼한 성격",desc:"눈에 보이는 것을 꼼꼼하게 살펴봐요. 정확하게 하는 것이 중요해요."},
N:{emoji:"💡",label:"새로운 것을 좋아하는 창의적인 성격",desc:"새로운 생각을 많이 해요. 창의적으로 다른 방법을 찾는 것을 좋아해요."},
T:{emoji:"🧩",label:"이유를 생각하는 논리적인 성격",desc:"왜 그런지 논리적으로 생각해요. 맞는 것과 틀린 것을 잘 구별해요."},
F:{emoji:"💛",label:"친구를 도와주는 따뜻한 성격",desc:"다른 사람의 마음을 잘 알아요. 따뜻하게 도와주는 것을 좋아해요."},
J:{emoji:"📋",label:"순서를 먼저 정하는 계획적인 성격",desc:"무엇을 하기 전에 계획적으로 순서를 정해요. 약속 시간을 잘 지켜요."},
P:{emoji:"🦋",label:"틀이 없는 자유로운 성격",desc:"정해진 것보다 자유롭게 하는 것을 좋아해요. 그때그때 하고 싶은 것을 해요."}
};

const dims=[
{key:"EI",left:"E",right:"I",ll:"활발",rl:"조용",lc:"#FF6B35",rc:"#5B8DEF"},
{key:"SN",left:"S",right:"N",ll:"꼼꼼",rl:"창의",lc:"#2ECC71",rc:"#9B59B6"},
{key:"TF",left:"T",right:"F",ll:"논리",rl:"따뜻",lc:"#3498DB",rc:"#E74C8B"},
{key:"JP",left:"J",right:"P",ll:"계획",rl:"자유",lc:"#F39C12",rc:"#1ABC9C"}
];

const typeDesc={
ESTJ:{t:"든든한 리더",d:"활발하고 꼼꼼하게 일하면서 논리적으로 계획을 세워요."},
ESTP:{t:"활발한 모험가",d:"밝고 활발하게 행동하고, 지금 이 순간을 자유롭게 즐겨요."},
ESFJ:{t:"다정한 친구",d:"활발하게 친구들을 만나고, 따뜻하게 도와주는 것을 좋아해요."},
ESFP:{t:"밝은 분위기 메이커",d:"활발하고 밝은 성격으로 모두를 자유롭게 즐겁게 해 줘요."},
ENTJ:{t:"멋진 지휘자",d:"활발하게 새로운 생각을 하고, 논리적으로 계획을 세워요."},
ENTP:{t:"창의적인 발명가",d:"밝고 활발하게 창의적인 생각을 자유롭게 이야기해요."},
ENFJ:{t:"따뜻한 선생님",d:"활발하게 사람들과 만나고, 따뜻하게 모두를 도와줘요."},
ENFP:{t:"밝은 꿈꾸는 사람",d:"활발하고 창의적으로 새로운 것을 자유롭게 찾아다녀요."},
ISTJ:{t:"믿음직한 사람",d:"조용하고 꼼꼼하게 일하면서 논리적으로 계획을 잘 세워요."},
ISTP:{t:"조용한 관찰자",d:"조용히 꼼꼼하게 살펴보고, 논리적으로 자유롭게 행동해요."},
ISFJ:{t:"조용한 수호자",d:"조용하지만 꼼꼼하고, 따뜻하게 다른 사람을 도와줘요."},
ISFP:{t:"부드러운 예술가",d:"조용하고 따뜻한 마음으로 자유롭게 아름다운 것을 좋아해요."},
INTJ:{t:"조용한 전략가",d:"조용히 창의적으로 생각하고, 논리적으로 계획을 세워요."},
INTP:{t:"생각이 깊은 사람",d:"조용히 창의적이고 논리적으로 깊이 생각하는 것을 좋아해요."},
INFJ:{t:"따뜻한 이상가",d:"조용하지만 창의적이고, 따뜻한 마음으로 세상을 생각해요."},
INFP:{t:"마음이 따뜻한 시인",d:"조용하고 창의적이며, 따뜻한 마음으로 자유롭게 꿈을 꿔요."}
};

const dimEmoji={EI:"🗣️",SN:"🎨",TF:"💭",JP:"📅"};
const gradients=["linear-gradient(135deg,#FF6B35,#FF8F5E)","linear-gradient(135deg,#2ECC71,#58D68D)","linear-gradient(135deg,#3498DB,#5DADE2)","linear-gradient(135deg,#F39C12,#F7C948)"];

let current=0, answers={}, picking=false;

function show(id){document.querySelectorAll('.screen').forEach(s=>{s.classList.add('hidden');s.classList.remove('active')});const el=document.getElementById(id);el.classList.remove('hidden');setTimeout(()=>el.classList.add('active'),30)}

function startQuiz(){current=0;answers={};show('screen-quiz');renderQuestion()}

function renderQuestion(){
  const q=questions[current];
  const di=dims.find(d=>d.key===q.dimension);
  document.getElementById('progress-fill').style.width=((current)/12*100)+'%';
  document.getElementById('progress-text').textContent=(current+1)+' / 12';
  document.getElementById('dim-badge').textContent=dimEmoji[q.dimension]+' '+di.ll+' vs '+di.rl;
  document.getElementById('q-text').textContent=q.text;
  document.getElementById('text-a').textContent=q.a.text;
  document.getElementById('text-b').textContent=q.b.text;
  document.getElementById('label-a').style.background=di.lc;
  document.getElementById('label-b').style.background=di.rc;
  document.getElementById('opt-a').style.borderColor='#e0e0e0';
  document.getElementById('opt-b').style.borderColor='#e0e0e0';
  document.getElementById('opt-a').style.background='#fff';
  document.getElementById('opt-b').style.background='#fff';
  document.getElementById('opt-a').classList.remove('picked');
  document.getElementById('opt-b').classList.remove('picked');
  picking=false;

  // re-trigger animation
  const quiz=document.getElementById('screen-quiz');
  quiz.classList.remove('active');
  setTimeout(()=>quiz.classList.add('active'),30);
}

function pickAnswer(choice){
  if(picking) return;
  picking=true;
  const q=questions[current];
  const di=dims.find(d=>d.key===q.dimension);
  const btn=document.getElementById(choice==='A'?'opt-a':'opt-b');
  btn.style.borderColor=choice==='A'?di.lc:di.rc;
  btn.classList.add('picked');
  answers[q.id]=choice;

  setTimeout(()=>{
    if(current<11){current++;renderQuestion()}
    else showResult();
  },400);
}

function showResult(){
  const scoring={EI:{qs:["Q1","Q2","Q3"],A:"E",B:"I"},SN:{qs:["Q4","Q5","Q6"],A:"S",B:"N"},TF:{qs:["Q7","Q8","Q9"],A:"T",B:"F"},JP:{qs:["Q10","Q11","Q12"],A:"J",B:"P"}};
  let type='';const scores={};
  for(const[k,v]of Object.entries(scoring)){
    let ac=0;v.qs.forEach(q=>{if(answers[q]==='A')ac++});
    const w=ac>=2?v.A:v.B;type+=w;scores[k]={a:ac,b:3-ac,winner:w};
  }

  // Type letters
  const row=document.getElementById('type-row');
  row.innerHTML='';
  type.split('').forEach((l,i)=>{
    const d=document.createElement('div');
    d.className='type-letter';d.textContent=l;d.style.background=gradients[i];d.style.animationDelay=(i*.15)+'s';
    row.appendChild(d);
  });

  const info=typeDesc[type];
  document.getElementById('result-title').textContent=info.t;
  document.getElementById('result-desc').textContent=info.d;

  // Detail cards
  const sec=document.getElementById('detail-section');
  sec.innerHTML='<h3 class="detail-heading">나의 성격 4가지</h3>';
  sec.classList.remove('show');

  dims.forEach(dim=>{
    const s=scores[dim.key];
    const rt=resultTypes[s.winner];
    const card=document.createElement('div');card.className='dim-card';
    card.innerHTML=`
      <div class="dim-header"><span class="dim-emoji">${rt.emoji}</span><span class="dim-label">${rt.label}</span></div>
      <p class="dim-desc">${rt.desc}</p>
      <div class="bar-track"><div class="bar-fill" style="width:${(s.a/3*100)}%;background:${dim.lc}"></div></div>
      <div class="bar-labels">
        <span style="color:${dim.lc};font-weight:${s.winner===dim.left?700:400}">${dim.ll} (${s.a})</span>
        <span style="color:${dim.rc};font-weight:${s.winner===dim.right?700:400}">${dim.rl} (${s.b})</span>
      </div>`;
    sec.appendChild(card);
  });

  show('screen-result');
  setTimeout(()=>sec.classList.add('show'),800);
}

function restart(){show('screen-start')}
</script>
</body>
</html>
